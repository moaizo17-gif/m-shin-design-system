<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; background: #f5f7fa; padding: 32px; }
  .card { background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .logo { display: inline-block; background: #003070; color: #fff; font-size: 22px; font-weight: 900; padding: 6px 14px; border-radius: 4px; margin-bottom: 24px; letter-spacing: 1px; }
  .section-title { font-size: 11px; font-weight: 700; color: #1469C7; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .main-copy { font-size: 26px; font-weight: 900; color: #003070; line-height: 1.4; margin-bottom: 24px; }
  .divider { height: 2px; background: #1469C7; margin: 24px 0; border-radius: 2px; }
  .item { margin-bottom: 20px; }
  .label { font-size: 11px; color: #888; font-weight: 600; margin-bottom: 4px; letter-spacing: 1px; }
  .value { font-size: 16px; color: #1a1a2e; font-weight: 700; }
  .value.sub { font-size: 14px; font-weight: 500; color: #444; }
  .pillars { display: flex; gap: 12px; margin-top: 8px; }
  .pillar { flex: 1; background: #f0f5ff; border-left: 4px solid #1469C7; border-radius: 0 8px 8px 0; padding: 12px 14px; }
  .pillar-num { font-size: 11px; color: #1469C7; font-weight: 800; }
  .pillar-title { font-size: 14px; font-weight: 800; color: #003070; margin: 2px 0; }
  .pillar-sub { font-size: 11px; color: #666; }
  .philosophy { background: linear-gradient(135deg, #003070, #1469C7); border-radius: 10px; padding: 20px 24px; margin-top: 20px; }
  .philosophy .label { color: rgba(255,255,255,0.7); }
  .philosophy .value { color: #fff; font-size: 18px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">M進</div>

  <div class="section-title">Main Copy</div>
  <div class="main-copy">一人ひとりの可能性を<br>引き出したい。</div>

  <div class="divider"></div>

  <div class="item">
    <div class="label">SUB CATCH</div>
    <div class="value">「学ぶコロを元気にする」</div>
  </div>

  <div class="item">
    <div class="label">EVENT COPY</div>
    <div class="value">本気の今が、未来をつくる</div>
  </div>

  <div class="item">
    <div class="label">POSITION</div>
    <div class="value sub">岩手県内合格実績 No.1 ／ 地域密着型 ／ 熱血 × データ</div>
  </div>

  <div class="divider"></div>

  <div class="section-title">3つのブランド軸</div>
  <div class="pillars">
    <div class="pillar">
      <div class="pillar-num">01</div>
      <div class="pillar-title">実績</div>
      <div class="pillar-sub">数字が証明する信頼</div>
    </div>
    <div class="pillar">
      <div class="pillar-num">02</div>
      <div class="pillar-title">熱量</div>
      <div class="pillar-sub">生徒と向き合う本気</div>
    </div>
    <div class="pillar">
      <div class="pillar-num">03</div>
      <div class="pillar-title">個別対応</div>
      <div class="pillar-sub">一人ひとりへの寄り添い</div>
    </div>
  </div>

  <div class="philosophy">
    <div class="label">教育理念</div>
    <div class="value">「人は限りない可能性を秘めている」<br>能力無限</div>
  </div>
</div>
</body>
</html>
